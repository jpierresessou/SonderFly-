<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0D0D1A">
    <link rel="manifest" href="/manifest.json">
    <title>SonderFly</title>
    <style>
        :root{--bg:#0D0D1A;--bg-light:#1a1a35;--violet:#6D28D9;--violet-light:#8B5CF6;--violet-blue:#5B4FCF;--red:#e53935;--text:#e0e0e0;--green:#4ade80;--font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:var(--font-body);background:#000;color:var(--text);height:100vh;height:100dvh;overflow:hidden;display:flex;justify-content:center;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;}
        .app-container{width:100%;max-width:430px;height:100vh;height:100dvh;position:relative;overflow:hidden;background:#0a0a0a;}

        .slideshow-full{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
        .slideshow-full .slide{position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:opacity 1.5s;}
        .slideshow-full .slide.active{opacity:1;}
        .slideshow-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:2;pointer-events:none;}
        .brand{font-family:'Arial Black','Impact',sans-serif;font-size:38px;color:#fff;text-shadow:0 0 25px rgba(139,92,246,0.6);letter-spacing:3px;position:absolute;top:16px;left:20px;z-index:25;transition:all 0.6s;}
        .brand.move-down{top:50%!important;left:50%!important;transform:translate(-50%,-50%)!important;margin-top:-170px;font-size:52px;text-align:center;}
        .brand .sonder{font-weight:900;}.brand .fly{font-weight:400;}
        .lang-flags{position:absolute;top:20px;right:20px;display:flex;gap:10px;z-index:20;}
        .lang-flag{width:36px;height:24px;border-radius:4px;cursor:pointer;opacity:0.6;border:2px solid transparent;font-size:22px;display:flex;align-items:center;justify-content:center;}
        .lang-flag.active-lang{opacity:1;border-color:#fff;}
        .tagline-container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;width:90%;text-align:center;pointer-events:none;transition:opacity 0.5s;}
        .tagline-container.hide{opacity:0;}
        .tagline-word{display:block;font-family:'Arlon','Impact','Arial Black',sans-serif;font-weight:900;font-size:40px;color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.8),0 0 40px rgba(139,92,246,0.6),3px 3px 8px rgba(0,0,0,0.8);letter-spacing:5px;line-height:1.4;opacity:1;}
        .tagline-word.line1{animation:slideLeft 6s ease-in-out infinite;}
        .tagline-word.line2{animation:slideRight 6s ease-in-out infinite;}
        .tagline-word.line3{animation:slideLeft 6s ease-in-out infinite;}
        @keyframes slideLeft{0%,100%{opacity:0;transform:translateX(-100px);}12%{opacity:1;transform:translateX(0);}70%{opacity:1;transform:translateX(0);}82%{opacity:0;transform:translateX(0);}}
        @keyframes slideRight{0%,100%{opacity:0;transform:translateX(100px);}12%{opacity:1;transform:translateX(0);}70%{opacity:1;transform:translateX(0);}82%{opacity:0;transform:translateX(0);}}
        .content-overlay{position:absolute;bottom:30px;left:0;width:100%;z-index:10;display:flex;flex-direction:column;align-items:center;padding:0 20px;}
        .glass-panel{background:rgba(255,255,255,0.1);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,0.2);border-radius:24px;padding:20px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;overflow:hidden;max-height:280px;transition:all 0.5s;}
        .glass-panel.expand{max-width:100%;max-height:480px;overflow-y:auto;}
        .panel-section{transition:all 0.4s;}.panel-section.hide{opacity:0;transform:translateY(5px);pointer-events:none;max-height:0;overflow:hidden;margin:0;padding:0;}
        .greeting-row{display:flex;gap:8px;justify-content:center;min-height:28px;}
        .greeting-row.hide{opacity:0;max-height:0;overflow:hidden;}
        .greeting-word{font-size:17px;font-style:italic;color:#fff;text-shadow:0 0 15px #fff;}
        .btn{display:block;width:100%;padding:15px;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;border:none;}
        .btn.primary{background:var(--violet);color:#fff;}.btn.secondary{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.25);}
        .btn.danger{background:rgba(229,57,53,0.3);backdrop-filter:blur(10px);color:#fff;border:1px solid rgba(229,57,53,0.4);}
        .field{margin-bottom:10px;}.field label{display:block;font-size:10px;color:#ccc;margin-bottom:3px;letter-spacing:1px;text-transform:uppercase;}
        .field input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);border-radius:12px;color:#fff;font-size:14px;font-family:inherit;}
        .btn-back-panel{font-size:12px;color:#bbb;text-align:center;cursor:pointer;text-decoration:underline;}

        .page{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--bg-light);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;z-index:5;transition:transform 0.4s;}
        .page.active{transform:translateX(0);z-index:15;}.page.hidden-right{transform:translateX(105%);pointer-events:none;}.page.hidden-left{transform:translateX(-105%);pointer-events:none;}

        /* ========== CONTACTS ========== */
        .top-header{background:var(--violet);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin:-16px -16px 16px -16px;position:sticky;top:-16px;z-index:10;}
        .top-header .site-name{color:#fff;font-family:'Arial Black','Impact',sans-serif;font-size:18px;}
        .top-header .profile-thumb{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;border:2px solid rgba(255,255,255,0.5);font-size:16px;color:#fff;font-weight:700;flex-shrink:0;}
        .top-header .profile-thumb img{width:100%;height:100%;object-fit:cover;}
        .search-bar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.06);border-radius:12px;padding:8px 12px;margin-bottom:12px;}
        .search-bar input{flex:1;background:transparent;border:none;color:#fff;font-size:14px;font-family:inherit;outline:none;padding:4px;}
        .add-contact-btn{width:36px;height:36px;border-radius:50%;background:transparent;border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .contacts-list{display:flex;flex-direction:column;gap:2px;flex:1;}
        .contact-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,0.03);border-radius:12px;cursor:pointer;}
        .contact-avatar{width:44px;height:44px;border-radius:50%;background:var(--violet);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;flex-shrink:0;overflow:hidden;}
        .contact-avatar img{width:100%;height:100%;object-fit:cover;}
        .contact-info{flex:1;min-width:0;}.contact-name{color:#fff;font-weight:500;font-size:15px;}
        .contact-last-msg{font-size:12px;color:#999;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .delete-account-btn{text-align:center;padding:12px 0 8px;font-size:13px;cursor:pointer;color:#e53935;}

        /* ========== CHAT ========== */
        .chat-header{display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:8px;}
        .chat-header .avatar{width:42px;height:42px;border-radius:50%;background:var(--violet);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;flex-shrink:0;overflow:hidden;}
        .chat-header .avatar img{width:100%;height:100%;object-fit:cover;}
        .chat-header .info{flex:1;}
        .chat-header .name{font-weight:600;color:#fff;font-size:15px;}
        .chat-header .status-text{font-size:11px;color:#aaa;}
        .back-arrow{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;}
        .msg-list{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:4px;}
        .bubble{max-width:78%;padding:8px 12px;border-radius:16px;font-size:13px;line-height:1.4;animation:msgIn 0.3s ease;}
        @keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .bubble.other{background:#fff;align-self:flex-start;border-bottom-left-radius:4px;color:var(--violet-blue);}
        .bubble.me{background:var(--violet-blue);align-self:flex-end;border-bottom-right-radius:4px;color:#fff;}
        .bubble .who{font-size:10px;font-weight:600;margin-bottom:2px;}
        .bubble img.msg-img{max-width:180px;max-height:180px;border-radius:10px;margin:4px 0;}
        .bubble.voice{background:#1F1435;border:1px solid #3A2A55;display:flex;align-items:center;gap:8px;cursor:pointer;color:#fff;}
        .waveform{display:flex;align-items:flex-end;gap:2px;height:22px;}
        .wave-bar{width:3px;background:var(--violet-light);border-radius:2px;animation:waveAnim 0.7s infinite;}
        @keyframes waveAnim{0%,100%{height:5px;}50%{height:16px;}}
        .msg-check{font-size:10px;text-align:right;opacity:0.7;}
        .msg-time{font-size:10px;text-align:right;opacity:0.6;margin-top:2px;}
        .msg-countdown{font-size:9px;text-align:right;color:#ff9800;margin-top:1px;}
        .typing-indicator{font-size:11px;color:var(--green);font-style:italic;padding:2px 0;}

        .chat-input-zone{display:flex;gap:6px;padding:6px 10px;align-items:center;background:rgba(255,255,255,0.05);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.1);border-radius:26px;min-height:44px;flex-wrap:wrap;}
        .chat-input-zone input{flex:1;min-width:80px;padding:8px 4px;background:transparent;border:none;color:#fff;font-size:14px;font-family:inherit;outline:none;}
        .media-preview-row{display:flex;gap:6px;flex-wrap:wrap;width:100%;padding:4px 0;}
        .media-preview-item{width:50px;height:50px;border-radius:10px;background-size:cover;background-position:center;position:relative;}
        .media-preview-item .remove-media{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;}
        .icon-btn{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;color:#fff;font-size:22px;flex-shrink:0;}
        .icon-btn.send-btn{background:var(--violet);width:38px;height:38px;}
        .icon-btn.voice-btn{width:46px;height:46px;background:var(--red);box-shadow:0 4px 18px rgba(229,57,53,0.4);}
        .live-indicator{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(229,57,53,0.9);color:#fff;font-size:11px;padding:4px 14px;border-radius:12px;z-index:55;display:none;}
        .live-indicator.on{display:block;}

        /* ========== OVERLAYS ========== */
        .contact-overlay,.profile-overlay,.confirm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
        .contact-overlay.show,.profile-overlay.show,.confirm-overlay.show{opacity:1;pointer-events:auto;}
        .overlay-panel{background:rgba(255,255,255,0.1);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,0.2);border-radius:24px;padding:20px;width:90%;max-width:360px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px;animation:doorIn 0.4s ease;}
        @keyframes doorIn{0%{transform:scale(0.9);opacity:0;}60%{transform:scale(1.03);}100%{transform:scale(1);opacity:1;}}

        .toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid rgba(255,255,255,0.2);padding:10px 20px;border-radius:20px;font-size:11px;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
        .toast.show{opacity:1;}
        input[type="file"]{display:none;}
        select{width:100%;padding:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);border-radius:12px;color:#fff;font-size:14px;font-family:inherit;}
    </style>
</head>
<body>
<div class="app-container" id="app">

    <div class="page active" id="homePage" style="background:transparent;padding:0;">
        <div class="slideshow-full" id="slideshow">
            <div class="slide active" style="background-image:url('https://fxlvovlepjjffjgwifej.supabase.co/storage/v1/object/public/Ilages/IMG-20260502-WA0002.jpg');"></div>
            <div class="slide" style="background-image:url('https://fxlvovlepjjffjgwifej.supabase.co/storage/v1/object/public/Ilages/IMG-20260502-WA0004.jpg');"></div>
            <div class="slide" style="background-image:url('https://fxlvovlepjjffjgwifej.supabase.co/storage/v1/object/public/Ilages/IMG-20260502-WA0003.jpg');"></div>
            <div class="slide" style="background-image:url('https://fxlvovlepjjffjgwifej.supabase.co/storage/v1/object/public/Ilages/IMG-20260502-WA0006.jpg');"></div>
            <div class="slide" style="background-image:url('https://fxlvovlepjjffjgwifej.supabase.co/storage/v1/object/public/Ilages/IMG-20260502-WA0007.jpg');"></div>
            <div class="slide" style="background-image:url('https://fxlvovlepjjffjgwifej.supabase.co/storage/v1/object/public/Ilages/IMG-20260502-WA0008.jpg');"></div>
            <div class="slide" style="background-image:url('https://fxlvovlepjjffjgwifej.supabase.co/storage/v1/object/public/Ilages/IMG-20260502-WA0009.jpg');"></div>
            <div class="slide" style="background-image:url('https://fxlvovlepjjffjgwifej.supabase.co/storage/v1/object/public/Ilages/IMG-20260502-WA0010.jpg');"></div>
        </div>
        <div class="slideshow-overlay"></div>
        <div class="brand" id="brand"><span class="sonder">Sonder</span><span class="fly">Fly</span></div>
        <div class="lang-flags"><span class="lang-flag active-lang" data-lang="fr" onclick="setLang('fr')">🇫🇷</span><span class="lang-flag" data-lang="en" onclick="setLang('en')">🇬🇧</span></div>
        <div class="tagline-container" id="taglineContainer"><span class="tagline-word line1" id="tagline1">CAUSONS</span><span class="tagline-word line2" id="tagline2">DISCRÈTEMENT</span><span class="tagline-word line3" id="tagline3">LÀ !</span></div>
        <div class="content-overlay">
            <div class="glass-panel" id="glassPanel">
                <div class="greeting-row" id="greetingRow"></div>
                <div class="panel-section" id="panelHomeButtons" style="display:flex;flex-direction:column;gap:12px;">
                    <button class="btn primary" id="btnCreate" onclick="expandPanel('register')">CRÉER UN COMPTE</button>
                    <button class="btn secondary" id="btnLogin" onclick="expandPanel('login')">S'IDENTIFIER</button>
                </div>
                <div class="panel-section hide" id="panelRegister">
                    <div class="field"><label>Nom complet</label><input type="text" id="regName" placeholder="Jean Dupont"></div>
                    <div class="field"><label>Numéro</label><input type="tel" id="regPhone" placeholder="+33 6 12 34 56 78"></div>
                    <div class="field"><label>Mot de passe</label><input type="password" id="regPassword" placeholder="••••••••"></div>
                    <button class="btn primary" onclick="register()">VALIDÉ</button>
                    <div class="btn-back-panel" onclick="collapsePanel()">← Retour</div>
                </div>
                <div class="panel-section hide" id="panelLogin">
                    <div class="field"><label>Numéro</label><input type="text" id="loginPhone" placeholder="+33 6 12 34 56 78"></div>
                    <div class="field"><label>Mot de passe</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
                    <button class="btn primary" onclick="login()">VALIDÉ</button>
                    <div class="btn-back-panel" onclick="collapsePanel()">← Retour</div>
                </div>
            </div>
        </div>
    </div>

    <div class="page hidden-right" id="contactsPage" style="padding:0;">
        <div class="top-header">
            <span class="site-name">SonderFly</span>
            <div class="profile-thumb" id="profileThumb" onclick="showProfile()">?</div>
        </div>
        <div style="padding:0 16px;">
            <div class="search-bar"><span>🔍</span><input type="text" id="searchInput" placeholder="Rechercher..." oninput="filterContacts()"><button class="add-contact-btn" onclick="showAddContact()">+</button></div>
            <div class="contacts-list" id="contactsList"><div style="text-align:center;color:#555;padding:30px;">Aucun contact</div></div>
            <div class="delete-account-btn" onclick="confirmDeleteAccount()">Supprimer le compte</div>
        </div>
    </div>

    <div class="page hidden-right" id="msgPage" style="padding:16px;">
        <div class="live-indicator" id="liveIndicator">🔴 LIVE</div>
        <div class="chat-header">
            <div class="back-arrow" onclick="goTo('contactsPage')">←</div>
            <div class="avatar" id="chatAvatar">?</div>
            <div class="info"><div class="name" id="chatName">Discussion</div><div class="status-text" id="chatStatus">En ligne</div><div class="typing-indicator" id="typingIndicator" style="display:none;">En train d'écrire...</div></div>
        </div>
        <div class="msg-list" id="msgList"><div style="text-align:center;color:#555;padding:30px;">Aucun message</div></div>
        <div class="chat-input-zone">
            <button class="icon-btn" onclick="document.getElementById('imageInput').click()">+</button>
            <input type="text" id="textInput" placeholder="Message..." maxlength="500">
            <div class="media-preview-row" id="mediaPreview"></div>
            <button class="icon-btn send-btn" onclick="sendText()"><svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
            <button class="icon-btn voice-btn" id="pttBtn"><svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
        </div>
        <input type="file" id="imageInput" accept="image/*,video/*,audio/*" multiple onchange="handleMedia(this)">
    </div>

    <div class="contact-overlay" id="addContactOverlay"><div class="overlay-panel"><h3 style="color:#fff;">Nouveau contact</h3><div class="field"><label>NUMÉRO CONTACT</label><input type="tel" id="newContactPhone"></div><button class="btn primary" onclick="addContact()">AJOUTER</button><button class="btn secondary" onclick="hideAddContact()">Annuler</button></div></div>

    <div class="profile-overlay" id="profileOverlay"><div class="overlay-panel"><div style="text-align:center;"><div style="width:70p
